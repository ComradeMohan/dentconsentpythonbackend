<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saveetha Dental – Dental Implant Consent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 30px 16px;
}
h1 { font-size: 1.35rem; font-weight: 700; color: #1a2a3a; margin-bottom: 4px; text-align: center; }
.subtitle { color: #64748b; font-size: 0.84rem; margin-bottom: 28px; text-align: center; }
.main { display: flex; gap: 24px; width: 100%; max-width: 1100px; align-items: flex-start; }

.input-panel {
  background: white; border-radius: 16px; padding: 26px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  width: 310px; flex-shrink: 0; position: sticky; top: 20px;
}
.input-panel h2 { font-size: 0.95rem; font-weight: 600; color: #1a2a3a; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid #f0f4f8; }
.field-row { margin-bottom: 13px; }
.field-row label { display: block; font-size: 0.71rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.field-row input, .field-row select {
  width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0;
  border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.87rem;
  color: #1a2a3a; background: #fafbfc; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.field-row input:focus, .field-row select:focus {
  border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
.section-sep { font-size: 0.69rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin: 16px 0 12px; padding-top: 14px; border-top: 1px dashed #e2e8f0; }
.generate-btn {
  width: 100%; padding: 13px; background: linear-gradient(135deg, #1d4ed8, #1e40af);
  color: white; border: none; border-radius: 10px; font-family: 'Inter', sans-serif;
  font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 20px;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 14px rgba(29,78,216,0.35);
}
.generate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(29,78,216,0.45); }

.preview-panel { flex: 1; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
.preview-header { background: #1a2a3a; color: white; padding: 13px 22px; font-size: 0.82rem; font-weight: 600; }
.preview-body { padding: 24px; background: #dde3ea; display: flex; justify-content: center; overflow-x: auto; }

/* ── PDF Page ── */
.pdf-page {
  width: 595px; min-height: 842px; background: white;
  box-shadow: 0 4px 32px rgba(0,0,0,0.22);
  padding: 36px 50px 40px;
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 9.5pt; color: #000; flex-shrink: 0;
}
.pdf-logos { display: flex; justify-content: center; gap: 36px; margin-bottom: 10px; align-items: center; }
.pdf-logos img { height: 76px; width: auto; object-fit: contain; }
.pdf-title { text-align: center; font-size: 9.8pt; line-height: 1.6; margin-bottom: 14px; }
/* 2-column name/date fields */
.pdf-fields-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 20px; margin-bottom: 12px; }
.pdf-field-inline { display: flex; align-items: baseline; gap: 3px; font-size: 9.2pt; }
.pdf-field-label { white-space: nowrap; font-size: 9.2pt; }
.pdf-underline { flex: 1; border-bottom: 1px solid #333; height: 15px; font-size: 9.2pt; color: #0000cc; padding: 0 3px; display: flex; align-items: flex-end; font-weight: 500; min-width: 60px; }
.pdf-underline.empty { color: transparent; }
.pdf-body { font-size: 8.7pt; line-height: 1.68; text-align: justify; margin-bottom: 9px; }
.pdf-aware { font-size: 9pt; font-weight: bold; margin-bottom: 6px; }
.pdf-item { display: flex; gap: 4px; margin-bottom: 5px; font-size: 8.5pt; line-height: 1.65; text-align: justify; }
.pdf-item-n { font-weight: bold; min-width: 13px; flex-shrink: 0; }
.pdf-sig-row { display: flex; justify-content: space-between; margin-top: 22px; gap: 30px; }
.pdf-sig-field { display: flex; align-items: baseline; gap: 4px; font-size: 9.2pt; flex: 1; }
.pdf-sig-underline { flex: 1; border-bottom: 1px solid #333; height: 15px; color: #0000cc; font-size: 9.2pt; padding: 0 3px; display: flex; align-items: flex-end; font-weight: 500; }
.pdf-sig-underline.empty { color: transparent; }

@media (max-width: 1000px) {
  .main { flex-direction: column; align-items: center; }
  .input-panel { width: 100%; max-width: 595px; position: static; }
  .pdf-page { transform: scale(0.68); transform-origin: top center; margin-bottom: -260px; }
}
</style>
</head>
<body>

<h1>&#x1F9B7; Saveetha Dental College &amp; Hospital</h1>
<p class="subtitle">Dental Implant Consent Form &mdash; Fill details &rarr; Live preview &rarr; Generate PDF</p>

<div class="main">
  <div class="input-panel">
    <h2>&#x1F4CB; Patient Details</h2>
    <div class="field-row"><label>Name</label><input type="text" id="f-name" placeholder="e.g. Ravi Kumar" oninput="update()"></div>
    <div class="field-row"><label>Date</label><input type="date" id="f-date" oninput="update()"></div>
    <div class="field-row"><label>Age</label><input type="number" id="f-age" placeholder="e.g. 35" min="1" max="120" oninput="update()"></div>
    <div class="field-row"><label>Gender</label>
      <select id="f-gender" onchange="update()">
        <option value="">-- Select --</option>
        <option>Male</option><option>Female</option><option>Other</option>
      </select>
    </div>
    <div class="section-sep">Signature</div>
    <div class="field-row"><label>Signature (Name)</label><input type="text" id="f-sig" placeholder="Patient / Parent / Guardian" oninput="update()"></div>
    <div class="field-row"><label>Signature Date</label><input type="date" id="f-sigdate" oninput="update()"></div>
    <button class="generate-btn" onclick="generatePDF()">&#x2B07; Generate &amp; Download PDF</button>
  </div>

  <div class="preview-panel">
    <div class="preview-header">&#x1F441; Live Preview &mdash; updates as you type</div>
    <div class="preview-body">
      <div class="pdf-page" id="pdf-page"></div>
    </div>
  </div>
</div>

const ITEMS = [
  "The treatment time can be between 3 to 8 months depending on the healing capacity of my body.",
  "I may have drug reactions and side effects, post-operative bleeding, infection (pus drainage), implant failure and bone loss.",
  "Complications of the replacement teeth such as screw loosening, ceramic fracture, acrylic teeth loosening, prosthesis fracture.",

function fmtDate(v) {
  if (!v) return "";
  const [y,m,d] = v.split("-");
  return d+"/"+m+"/"+y;
}

function vals() {
  return {
    name:    document.getElementById("f-name").value.trim(),
    date:    fmtDate(document.getElementById("f-date").value),
    age:     document.getElementById("f-age").value.trim(),
    gender:  document.getElementById("f-gender").value,
    sig:     document.getElementById("f-sig").value.trim(),
    sigdate: fmtDate(document.getElementById("f-sigdate").value),
  };
}

function uline(val, minw) {
  return `<div class="pdf-underline ${val?"":"empty"}" style="min-width:${minw||"100px"}">${val||"&nbsp;"}</div>`;
}

function update() {
  const V = vals();
  const itemsHTML = ITEMS.map((t,i) =>
    `<div class="pdf-item"><span class="pdf-item-n">${i+1}.</span><span>${t}</span></div>`
  ).join("");

  document.getElementById("pdf-page").innerHTML =
    `<div class="pdf-logos">
      <img src="${LOGO_LEFT}" alt="Saveetha Dental Logo">
      <img src="${LOGO_RIGHT}" alt="Saveetha University Logo">
    </div>
    <div class="pdf-title">
      <strong>Saveetha Dental College &amp; Hospital</strong><br>
      <strong>Consent For Dental Implant</strong>
    </div>
    <div class="pdf-fields-2col">
      <div class="pdf-field-inline"><span class="pdf-field-label">Name:</span>${uline(V.name,"130px")}</div>
      <div class="pdf-field-inline"><span class="pdf-field-label">Date:</span>${uline(V.date,"100px")}</div>

      necessary treatment. I understand I may need further treatment by a specialist or even
      hospitalisation if complications arise during or following treatment, the cost of which is my
      responsibility. I have been given satisfactory answers to all of my questions, and I wish to proceed

        <span>Date:</span>
        <div class="pdf-sig-underline ${V.sigdate?"":"empty"}">${V.sigdate||"&nbsp;"}</div>
      </div>
    </div>`;
}
