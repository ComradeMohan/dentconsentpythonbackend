<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saveetha – Dental Prosthodontics Consent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 30px 16px;
}
h1 { font-size: 1.3rem; font-weight: 700; color: #1a2a3a; margin-bottom: 4px; text-align: center; }
.subtitle { color: #64748b; font-size: 0.83rem; margin-bottom: 26px; text-align: center; }
.main { display: flex; gap: 24px; width: 100%; max-width: 1100px; align-items: flex-start; }

/* ── Input Panel ── */
.input-panel {
  background: white; border-radius: 16px; padding: 26px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  width: 310px; flex-shrink: 0; position: sticky; top: 20px;
}
.input-panel h2 { font-size: 0.93rem; font-weight: 600; color: #1a2a3a; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid #f0f4f8; }
.field-row { margin-bottom: 12px; }
.field-row label { display: block; font-size: 0.71rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.field-row input, .field-row select {
  width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0;
  border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.86rem;
  color: #1a2a3a; background: #fafbfc; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.field-row input:focus, .field-row select:focus {
  border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
.sep { font-size: 0.69rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
  color: #94a3b8; margin: 14px 0 11px; padding-top: 13px; border-top: 1px dashed #e2e8f0; }
.btn {
  width: 100%; padding: 13px; background: linear-gradient(135deg, #1d4ed8, #1e40af);
  color: white; border: none; border-radius: 10px; font-family: 'Inter', sans-serif;
  font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 18px;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 14px rgba(29,78,216,0.35);
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(29,78,216,0.45); }

/* ── Preview Panel ── */
.preview-panel { flex: 1; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden; }
.preview-hdr { background: #1a2a3a; color: white; padding: 13px 22px; font-size: 0.82rem; font-weight: 600; }
.preview-body { padding: 24px; background: #dde3ea; display: flex; justify-content: center; overflow-x: auto; }

/* ── PDF Page (exact A4 595px wide) ── */
.pdf {
  width: 595px; min-height: 842px; background: white;
  box-shadow: 0 4px 32px rgba(0,0,0,0.22);
  padding: 34px 48px 38px;
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 9pt; color: #000; flex-shrink: 0;
}

/* logos */
.pdf-logos { display: flex; justify-content: center; gap: 32px; margin-bottom: 8px; align-items: center; }
.pdf-logos img { height: 68px; width: auto; object-fit: contain; }

/* title - bold underlined centered, matches image */
.pdf-title {
  text-align: center; font-weight: bold; text-decoration: underline;
  text-underline-offset: 2px; font-size: 9.5pt; line-height: 1.6; margin-bottom: 14px;
}

/* 2-column patient fields */
.pdf-fields {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px 10px; margin-bottom: 13px;
}
.pdf-fi { display: flex; align-items: baseline; gap: 2px; font-size: 9pt; }
.pdf-lbl { white-space: nowrap; font-size: 9pt; }
.pdf-ul {
  flex: 1; border-bottom: 1px solid #333; min-height: 14px;
  font-size: 9pt; color: #0000cc; padding: 0 2px;
  display: flex; align-items: flex-end; font-weight: 500; min-width: 50px;
}
.pdf-ul.e { color: transparent; }

/* body paragraphs */
.pdf-body { font-size: 8.6pt; line-height: 1.7; text-align: justify; margin-bottom: 8px; }

/* risks intro bold */
.pdf-ri { font-size: 8.6pt; font-weight: bold; line-height: 1.65; text-align: justify; margin-bottom: 7px; }

/* numbered items */
.pdf-items { padding-left: 0; margin-bottom: 10px; }
.pdf-item {
  display: flex; gap: 6px; margin-bottom: 5px;
  font-size: 8.5pt; line-height: 1.65; text-align: justify;
  padding-left: 20px; position: relative;
}
.pdf-item-n {
  position: absolute; left: 0;
  font-weight: bold; min-width: 16px;
}

/* signature section */
.pdf-sig { margin-top: 18px; }
.pdf-sig-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 4px; }
.pdf-sf { display: flex; align-items: baseline; gap: 3px; font-size: 9pt; flex: 1; }
.pdf-sul {
  flex: 1; border-bottom: 1px solid #333; min-height: 14px;
  color: #0000cc; font-size: 9pt; padding: 0 2px;
  display: flex; align-items: flex-end; font-weight: 500;
}
.pdf-sul.e { color: transparent; }
.pdf-guardian { font-size: 8pt; color: #222; margin: 3px 0 12px 0; }
.pdf-rel-row { display: flex; align-items: baseline; gap: 3px; font-size: 9pt; margin-bottom: 3px; }
.pdf-rel-ul {
  border-bottom: 1px solid #333; min-height: 14px; flex: 1;
  color: #0000cc; font-size: 9pt; padding: 0 2px;
  display: flex; align-items: flex-end; font-weight: 500; max-width: 300px;
}
.pdf-rel-ul.e { color: transparent; }
.pdf-rel-note { font-size: 8pt; color: #222; }

@media (max-width: 1000px) {
  .main { flex-direction: column; align-items: center; }
  .input-panel { width: 100%; max-width: 595px; position: static; }
  .pdf { transform: scale(0.68); transform-origin: top center; margin-bottom: -260px; }
}
</style>
</head>
<body>

<h1>&#x1F9B7; Saveetha Dental – Prosthodontics Consent Form</h1>
<p class="subtitle">Fill patient details &rarr; Live preview updates &rarr; Click Generate PDF</p>

<div class="main">

  <!-- Input Panel -->
  <div class="input-panel">
    <h2>&#x1F4CB; Patient Details</h2>
    <div class="field-row"><label>Patient Name</label>
      <input type="text" id="f-name" placeholder="e.g. Ravi Kumar" oninput="update()">
    </div>
    <div class="field-row"><label>Date</label>
      <input type="date" id="f-date" oninput="update()">
    </div>
    <div class="field-row"><label>Age</label>
      <input type="number" id="f-age" placeholder="e.g. 45" min="1" max="120" oninput="update()">
    </div>
    <div class="field-row"><label>Gender</label>
      <select id="f-gender" onchange="update()">
        <option value="">-- Select --</option>
        <option>Male</option><option>Female</option><option>Other</option>
      </select>
    </div>

    <div class="sep">Signature Section</div>
    <div class="field-row"><label>Signature (Name)</label>
      <input type="text" id="f-sig" placeholder="Patient / Parent / Guardian" oninput="update()">
    </div>
    <div class="field-row"><label>Signature Date</label>
      <input type="date" id="f-sigdate" oninput="update()">
    </div>
    <div class="field-row"><label>Relationship (if Minor)</label>
      <input type="text" id="f-rel" placeholder="e.g. Father, Mother, Guardian" oninput="update()">
    </div>

    <button class="btn" onclick="generatePDF()">&#x2B07; Generate &amp; Download PDF</button>
  </div>

  <!-- Preview Panel -->
  <div class="preview-panel">
    <div class="preview-hdr">&#x1F441; Live Preview &mdash; updates as you type</div>
    <div class="preview-body">
      <div class="pdf" id="pdf"></div>
    </div>
  </div>

</div>

function fmtDate(v) {
  if (!v) return "";
  const [y,m,d] = v.split("-");
  return d+"/"+m+"/"+y;
}

function vals() {
  return {
    name:    document.getElementById("f-name").value.trim(),
    date:    fmtDate(document.getElementById("f-date").value),
    age:     document.getElementById("f-age").value.trim(),
    gender:  document.getElementById("f-gender").value,
    sig:     document.getElementById("f-sig").value.trim(),
    sigdate: fmtDate(document.getElementById("f-sigdate").value),
    rel:     document.getElementById("f-rel").value.trim(),
  };
}

function ul(val, minw, cls) {
  cls = cls || "pdf-ul";
  return `<div class="${cls} ${val?"":"e"}" style="min-width:${minw||"80px"}">${val||"&nbsp;"}</div>`;
}

function update() {
  const V = vals();

  const risksHTML = RISKS.map((r,i) =>
    `<div class="pdf-item">
       <span class="pdf-item-n">${i+1}.</span>
       <span>${r.en}</span>
     </div>`
  ).join("");

  document.getElementById("pdf").innerHTML = `
    <div class="pdf-logos">
      <img src="${LL}" alt="Saveetha Dental">
      <img src="${LR}" alt="Saveetha University">
    </div>

    <div class="pdf-title">
      SAVEETHA DENTAL COLLEGE AND HOSPITAL<br>
      CONSENT FOR DENTAL PROSTHODONTICS
    </div>

    <div class="pdf-fields">
      <div class="pdf-fi">
        <span class="pdf-lbl">Patient Name/</span>
        ${ul(V.name, "120px")}
      </div>
      <div class="pdf-fi">
        <span class="pdf-lbl">Date/</span>
        ${ul(V.date, "100px")}
      </div>
      <div class="pdf-fi">
        <span class="pdf-lbl">Age/</span>
        ${ul(V.age ? V.age+" yrs" : "", "120px")}
      </div>
      <div class="pdf-fi">
        <span class="pdf-lbl">Gender/</span>
        ${ul(V.gender, "100px")}
      </div>
    </div>

    <div class="pdf-body">
      An alternative to the following has been explained and I authorize the Dentist to do the following
      treatment and any others necessary for the reasons in. I understand I may need further treatment by a
      specialist or even hospitalization if complications arise during or following treatment, the cost of
      which is my responsibility. I have been given satisfactory answers to all of my questions, and I wish
      to proceed with the Recommended Treatment.
    </div>

    <div class="pdf-ri">
      These potential risks and complications, include, but are not limited to, the following:
    </div>

    <div class="pdf-items">
      ${risksHTML}
    </div>

    <div class="pdf-sig">
      <div class="pdf-sig-row">
        <div class="pdf-sf">
          <span>Signature/</span>
          ${ul(V.sig, "160px", "pdf-sul")}
        </div>
        <div class="pdf-sf">
          <span>Date/</span>
          ${ul(V.sigdate, "110px", "pdf-sul")}
        </div>
      </div>
      <div class="pdf-guardian">(Patient/Parent/Guardian)</div>

      <div class="pdf-rel-row">
        <span>Relationship (if Patient is a Minor):</span>
        ${ul(V.rel, "220px", "pdf-rel-ul")}
      </div>
      <div class="pdf-rel-note">உறவு (நோயாளி மைனராக இருந்தால்)</div>
    </div>
  `;
}

function generatePDF() {
  const V = vals();

  function uP(val, w) {
    return `<span style="display:inline-block;border-bottom:1pt solid #333;min-width:${w||"120pt"};
      color:${val?"#0000cc":"transparent"};font-weight:${val?"500":"normal"};
      padding:0 2pt;font-size:9pt;vertical-align:bottom">
      ${val||"&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"}</span>`;
  }

  const risksRows = RISKS.map((r,i) => `
    <tr>
      <td style="width:14pt;font-weight:bold;vertical-align:top;padding-right:5pt;padding-bottom:6pt;white-space:nowrap">${i+1}.</td>
      <td style="text-align:justify;line-height:1.65;padding-bottom:6pt;font-size:8.5pt">${r.en}</td>
    </tr>`).join("");

  const pw = window.open("","_blank","width=820,height=1060");
  pw.document.write(`<!DOCTYPE html>
